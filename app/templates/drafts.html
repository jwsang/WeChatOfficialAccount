{% extends "base.html" %}

{% block page_title %}草稿箱{% endblock %}
{% block page_id %}drafts{% endblock %}

{% block page_body %}
<section class="card">
    <div class="section-header inline-between">
        <div>
            <h2>微信公众号配置状态</h2>
            <p class="muted">用于校验草稿同步与真实发布能力。</p>
        </div>
        <button id="wechat-config-refresh-button" type="button" class="secondary">刷新配置</button>
    </div>
    <div id="wechat-config-message"></div>
    <form id="wechat-config-form" class="form-grid block-top wechat-config-inline-row">
        <div class="field">
            <label for="wechat-app-id">AppID</label>
            <input id="wechat-app-id" placeholder="请输入公众号 AppID" autocomplete="off" />
        </div>
        <div class="field">
            <label for="wechat-app-secret">AppSecret</label>
            <input id="wechat-app-secret" type="password" placeholder="请输入公众号 AppSecret" autocomplete="off" />
        </div>
        <div class="actions">
            <button type="submit">保存配置</button>
        </div>
    </form>
    <div id="wechat-config-status" class="empty block-top">正在检查微信公众号配置...</div>
</section>

<section class="card">
    <div class="section-header inline-between">
        <div>
            <h2>草稿列表</h2>
            <p class="muted">支持进入文章页编辑、预览、复制、删除及发布流程。</p>
        </div>
        <button id="draft-refresh-button" type="button" class="secondary">刷新草稿</button>
    </div>
    <div id="draft-list-message"></div>
    <div id="draft-list" class="draft-list empty">正在加载草稿箱...</div>
</section>

{% endblock %}
