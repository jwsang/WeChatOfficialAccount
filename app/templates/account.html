{% extends "base.html" %}

{% block page_title %}账号设置{% endblock %}
{% block page_id %}account{% endblock %}

{% block page_body %}

<section class="grid two-columns">
    <section class="card">
        <div class="section-header">
            <h2>用户信息</h2>
            <p class="muted">展示当前账号基础信息，可修改用户名和显示名称。</p>
        </div>
        <div id="account-basic-info" class="empty">正在加载账号信息...</div>
        <div id="account-profile-message" class="block-top"></div>
        <form id="account-profile-form" class="form-grid block-top">
            <div class="field">
                <label for="account-username">用户名</label>
                <input id="account-username" required minlength="3" maxlength="64" />
            </div>
            <div class="field">
                <label for="account-display-name">显示名称</label>
                <input id="account-display-name" required minlength="2" maxlength="100" />
            </div>
            <div class="actions">
                <button type="submit">保存资料</button>
            </div>
        </form>
    </section>

    <section class="card">
        <div class="section-header">
            <h2>密码重置</h2>
            <p class="muted">请先输入原密码，再设置符合规则的新密码（至少 8 位，包含字母、数字和特殊字符）。</p>
        </div>
        <div id="account-password-message"></div>
        <form id="account-password-form" class="form-grid block-top">
            <div class="field">
                <label for="account-old-password">原密码</label>
                <input id="account-old-password" type="password" autocomplete="current-password" required />
            </div>
            <div class="field">
                <label for="account-new-password">新密码</label>
                <input id="account-new-password" type="password" autocomplete="new-password" required minlength="8" maxlength="128" />
                <div id="account-password-strength" class="password-strength" aria-live="polite">
                    <div class="password-strength-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
                        <span id="account-password-strength-fill" class="password-strength-fill" style="width: 0%;"></span>
                    </div>
                    <div id="account-password-strength-text" class="muted">密码强度：未输入</div>
                </div>
                <ul class="password-rule-list" id="account-password-rule-list">
                    <li class="password-rule-item" data-rule="length">至少 8 位</li>
                    <li class="password-rule-item" data-rule="letter">包含字母</li>
                    <li class="password-rule-item" data-rule="number">包含数字</li>
                    <li class="password-rule-item" data-rule="special">包含特殊字符（如 !@#$%^&*）</li>
                </ul>
            </div>
            <div class="field">
                <label for="account-confirm-password">确认新密码</label>
                <input id="account-confirm-password" type="password" autocomplete="new-password" required minlength="8" maxlength="128" />
            </div>
            <div class="actions">
                <button type="submit">重置密码</button>
            </div>
        </form>
    </section>
</section>
{% endblock %}
