{% extends "base.html" %}

{% block page_title %}账号设置{% endblock %}
{% block page_id %}account{% endblock %}

{% block page_body %}
<header class="hero">
    <h1>账号设置</h1>
    <p>支持查看用户信息、修改显示资料和重置登录密码。</p>
</header>

<section class="grid two-columns">
    <section class="card">
        <div class="section-header">
            <h2>用户信息</h2>
            <p class="muted">展示当前账号基础信息，可修改用户名和显示名称。</p>
        </div>
        <div id="account-basic-info" class="empty">正在加载账号信息...</div>
        <div id="account-profile-message" class="block-top"></div>
        <form id="account-profile-form" class="form-grid block-top">
            <div class="field">
                <label for="account-username">用户名</label>
                <input id="account-username" required minlength="3" maxlength="64" />
            </div>
            <div class="field">
                <label for="account-display-name">显示名称</label>
                <input id="account-display-name" required minlength="2" maxlength="100" />
            </div>
            <div class="actions">
                <button type="submit">保存资料</button>
            </div>
        </form>
    </section>

    <section class="card">
        <div class="section-header">
            <h2>密码重置</h2>
            <p class="muted">请先输入原密码，再设置不少于 6 位的新密码。</p>
        </div>
        <div id="account-password-message"></div>
        <form id="account-password-form" class="form-grid block-top">
            <div class="field">
                <label for="account-old-password">原密码</label>
                <input id="account-old-password" type="password" autocomplete="current-password" required />
            </div>
            <div class="field">
                <label for="account-new-password">新密码</label>
                <input id="account-new-password" type="password" autocomplete="new-password" required minlength="6" maxlength="128" />
            </div>
            <div class="field">
                <label for="account-confirm-password">确认新密码</label>
                <input id="account-confirm-password" type="password" autocomplete="new-password" required minlength="6" maxlength="128" />
            </div>
            <div class="actions">
                <button type="submit">重置密码</button>
            </div>
        </form>
    </section>
</section>
{% endblock %}
