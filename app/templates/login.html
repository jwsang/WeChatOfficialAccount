{% extends "base.html" %}

{% block page_title %}登录{% endblock %}
{% block page_id %}login{% endblock %}

{% block page_body %}
<section class="login-hero">
    <span class="login-badge">内容运营平台</span>
    <h1>欢迎登录 {{ app_name }}</h1>
    <p>统一管理抓取、素材、文章与发布流程，帮助团队高效完成日常运营。</p>
</section>

<section class="card auth-card login-card">
    <div class="section-header">
        <h2>账号登录</h2>
        <p class="muted">输入账号密码后进入工作台。</p>
    </div>
    <div id="login-message"></div>
    <form id="login-form" class="form-grid block-top">
        <div class="field">
            <label for="login-username">用户名</label>
            <input id="login-username" autocomplete="username" placeholder="请输入用户名" required />
        </div>
        <div class="field">
            <label for="login-password">密码</label>
            <input id="login-password" type="password" autocomplete="current-password" placeholder="请输入密码" required />
        </div>
        <div class="actions login-actions">
            <button type="submit" class="login-submit">登录</button>
        </div>
    </form>
</section>
{% endblock %}
